<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IP Calculator</title>
<link rel="icon" type="image/svg+xml" href="./ip-icon.svg">
<style>
*{box-sizing:border-box}
body{font-family:"SN Pro","Helvetica Neue",Helvetica,"Nimbus Sans","Arial Nova",Arial,sans-serif;margin:0;padding:20px;display:flex;justify-content:center;align-items:center;min-height:100vh;transition:.3s;-webkit-font-smoothing:antialiased;text-rendering:geometricPrecision}
body.light{background:linear-gradient(135deg,#eef2ff,#f8fafc);color:#111}
body.dark{background:#0f172a;color:#e5e7eb}

.card{background:rgba(255,255,255,.78);padding:20px;border-radius:18px;box-shadow:0 10px 32px rgba(15,23,42,.12);width:100%;max-width:760px;backdrop-filter:blur(14px);overflow:hidden}
body.dark .card{background:rgba(30,41,59,.78)}

.toolbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px}
.toolbar-right{display:flex;align-items:center;gap:12px}
.site-logo{height:48px;width:min(240px,58vw);display:block}
.lang-toggle{display:flex;align-items:center;justify-content:center;width:42px;height:42px;padding:0;border:none;border-radius:12px;background:transparent;cursor:pointer;color:#111}
.lang-toggle img{width:24px;height:18px;display:block;border-radius:4px;overflow:hidden}
body.dark .lang-toggle{background:transparent;color:#e5e7eb}

.toggle{display:flex;justify-content:flex-end}
.switch{width:50px;height:26px;background:#ddd;border-radius:999px;position:relative;cursor:pointer}
.switch::after{content:"☀";position:absolute;width:22px;height:22px;top:2px;left:2px;background:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;transition:.3s}
body.dark .switch{background:#334155}
body.dark .switch::after{content:"☾";transform:translateX(24px)}

.ip-row{display:flex;gap:6px;margin-bottom:12px;width:100%;align-items:center}
.ip-row input{flex:1;min-width:0;padding:10px;border-radius:8px;border:1px solid #cbd5e1;text-align:center}
.ip-row input::selection{background:#c7d2fe;color:#111827}
.ip-row input:focus{outline:none;border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.18)}
.ip-row input.invalid{border-color:#ef4444;background:#fee2e2}
body.dark .ip-row input{background:#0f172a;color:#fff;border-color:#475569}
body.dark .ip-row input:focus{border-color:#818cf8;box-shadow:0 0 0 3px rgba(129,140,248,.22)}
body.dark .ip-row input.invalid{background:#7f1d1d;color:#fff;border-color:#f87171}
.slash{font-weight:700}
body.dark .slash{color:#fff}

.ip-action{width:42px;height:42px;border:none;border-radius:10px;background:#4f46e5;color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;flex:0 0 42px}
.ip-action img{width:18px;height:18px;display:block}
.ip-action:disabled{background:#cbd5e1;color:#64748b;cursor:not-allowed}
body.dark .ip-action{background:#6366f1;color:#fff}
body.dark .ip-action:disabled{background:#334155;color:#e2e8f0}
.actions{margin-top:12px}
.info-btn{width:100%;padding:10px 14px;border:none;border-radius:10px;background:#4f46e5;color:#fff;cursor:pointer;font-size:14px;font-weight:600}
.info-btn:disabled{background:#cbd5e1;color:#64748b;cursor:not-allowed}
body.dark .info-btn{background:#6366f1;color:#fff}
body.dark .info-btn:disabled{background:#334155;color:#e2e8f0}

.result{margin-top:14px;font-size:13px;line-height:1.65}
body.dark .result{color:#fff}
.badges{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.badge{display:inline-block;padding:4px 10px;border-radius:999px;font-size:12px}
.private{background:#2563eb22;color:#1d4ed8}
.shared{background:#f59e0b22;color:#b45309}
.public{background:#16a34a22;color:#15803d}
.linklocal{background:#06b6d422;color:#0e7490}
.reserved{background:#64748b22;color:#475569}
body.dark .badge{color:#fff}
body.dark .private{background:#2563ebaa}
body.dark .shared{background:#d97706cc}
body.dark .public{background:#16a34acc}
body.dark .linklocal{background:#0891b2cc}
body.dark .reserved{background:#64748bcc}

.summary-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:6px 18px}
.summary-grid div{min-width:0}
.advanced-toggle{margin-top:14px;color:#4f46e5;font-size:13px;font-weight:600;cursor:pointer;user-select:none;display:inline-flex;align-items:center;gap:8px}
.advanced-toggle::before{content:"›";font-size:18px;line-height:1;transform:rotate(90deg);transition:.2s}
.advanced-toggle.collapsed::before{transform:rotate(0deg)}
.advanced-panel{margin-top:10px;padding:14px 0 0;border-top:1px dashed #cbd5e1;animation:fadeIn .2s ease}
body.dark .advanced-toggle{color:#c4b5fd}
body.dark .advanced-panel{border-top-color:#475569}
.binary-row{display:grid;grid-template-columns:minmax(180px,max-content) minmax(0,1fr);gap:12px;font-family:"Iosevka Charon Mono",Iosevka,Consolas,"Courier New",monospace;font-size:12px;align-items:start}
.binary-row + .binary-row{margin-top:6px}
.binary-label{font-weight:700;white-space:nowrap}
.binary-value{word-break:break-all}
.status{margin-top:8px;font-size:12px;color:#64748b}
body.dark .status{color:#94a3b8}
.toast{position:fixed;right:20px;bottom:20px;z-index:50;min-width:180px;max-width:280px;padding:12px 14px;border-radius:12px;background:#0f172a;color:#fff;box-shadow:0 18px 45px rgba(15,23,42,.24);font-size:13px;font-weight:600;opacity:0;pointer-events:none;transform:translateY(12px);transition:opacity .2s ease,transform .2s ease}
.toast.show{opacity:1;transform:translateY(0)}
body.dark .toast{background:#f8fafc;color:#0f172a}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(-4px)}
  to{opacity:1;transform:translateY(0)}
}

@media (max-width:640px){
  .card{padding:16px}
  .toolbar{align-items:center}
  .toolbar-right{flex-direction:row;align-items:center;justify-content:flex-end}
  .site-logo{height:42px;width:min(190px,52vw)}
  .summary-grid{grid-template-columns:1fr}
  .binary-row{grid-template-columns:minmax(160px,max-content) minmax(0,1fr)}
}

@media (max-width:420px){
  body{padding:12px}
  .card{padding:14px}
  .ip-row{gap:4px}
  .ip-row input{padding:9px 4px;font-size:13px}
  .ip-part{flex:1 1 0;max-width:44px}
  #cidr{width:42px!important;flex:0 0 42px}
  .ip-action{width:38px;height:38px;flex-basis:38px}
  .slash{font-size:13px}
}
</style>
</head>
<body class="light">

<div class="card">
  <div class="toolbar">
    <img class="site-logo" src="./ip-logo.svg" alt="IP Calculator">
    <div class="toolbar-right">
      <button id="langToggle" class="lang-toggle" onclick="toggleLanguage()">
        <img id="langFlag" src="./flag-mn.svg" alt="Language flag">
      </button>
      <div class="toggle"><div class="switch" onclick="toggleTheme()"></div></div>
    </div>
  </div>

  <div class="ip-row">
    <input class="ip-part" maxlength="3" onmousedown="prepareFieldSelect(event,this)" onfocus="selectField(this)" oninput="next(this)" onkeydown="nav(event,this)">
    <input class="ip-part" maxlength="3" onmousedown="prepareFieldSelect(event,this)" onfocus="selectField(this)" oninput="next(this)" onkeydown="nav(event,this)">
    <input class="ip-part" maxlength="3" onmousedown="prepareFieldSelect(event,this)" onfocus="selectField(this)" oninput="next(this)" onkeydown="nav(event,this)">
    <input class="ip-part" maxlength="3" onmousedown="prepareFieldSelect(event,this)" onfocus="selectField(this)" oninput="next(this)" onkeydown="nav(event,this)">
    <span class="slash">/</span>
    <input id="cidr" maxlength="2" style="width:56px;text-align:center" placeholder="32" onmousedown="prepareFieldSelect(event,this)" onfocus="selectField(this)" oninput="handleCidrInput(this)" onkeydown="nav(event,this)">
    <button id="copyIconBtn" class="ip-action" type="button" onclick="copyIpValue()" title="Copy IP" aria-label="Copy IP">
      <img src="./copy.svg" alt="" aria-hidden="true">
    </button>
  </div>

  <div id="output" class="result"></div>
  <div class="actions">
    <button id="ipActionBtn" class="info-btn" type="button" onclick="handleIpAction()" disabled>IPInfo</button>
  </div>
  <div id="status" class="status"></div>
</div>

<div id="toast" class="toast"></div>

<script>
const ipInputs=()=>Array.from(document.querySelectorAll('.ip-part'));
let currentLanguage='mn';
let advancedOpen=false;

const translations={
  en:{
    title:'IP Calculator',
    invalid:'Enter a valid IPv4 address and CIDR.',
    langLabel:'English',
    infoTitle:'Open IP info',
    infoDisabled:'IP info is available only for public addresses.',
    infoButton:'Open In ipinfo.io',
    copyTitle:'Copy IP',
    copied:'Copied ✓',
    copyFailed:'Copy failed',
    badgePrivate:'Private Internet',
    badgeShared:'Shared Address Space',
    badgePublic:'Public Internet',
    badgeLinkLocal:'Link-local',
    badgeReserved:'Reserved / Special',
    addressClass:'Class',
    subnetMask:'Subnet Mask',
    wildcard:'Wildcard Mask',
    network:'Network',
    broadcast:'Broadcast',
    range:'Usable Range',
    hosts:'Usable Hosts',
    advancedView:'Binary View',
    showAdvanced:'Show advanced details',
    hideAdvanced:'Hide advanced details',
    addressCount:'Total Addresses',
    category:'Address Type',
    address:'Address',
    hostMin:'HostMin',
    hostMax:'HostMax',
    typePrivate:'RFC 1918 private range',
    typeShared:'RFC 6598 CGNAT/shared range',
    typeLinkLocal:'RFC 3927 link-local range',
    typeReserved:'Reserved or special-use range',
    typePublic:'Globally routable range'
  },
  mn:{
    title:'IP Тооцоолуур',
    invalid:'Зөв IPv4 хаяг болон CIDR оруулна уу.',
    langLabel:'Монгол',
    infoTitle:'IP мэдээлэл нээх',
    infoDisabled:'IP мэдээлэл зөвхөн public хаяг дээр идэвхтэй.',
    infoButton:'ipinfo.io дээр нээх',
    copyTitle:'IP хуулах',
    copied:'Хуулагдлаа',
    copyFailed:'Хуулахад алдаа гарлаа',
    badgePrivate:'Хувийн Сүлжээ',
    badgeShared:'Shared Address Space',
    badgePublic:'Нийтийн Интернэт',
    badgeLinkLocal:'Link-local',
    badgeReserved:'Тусгай / Нөөцлөгдсөн',
    addressClass:'Класс',
    subnetMask:'Дэд Сүлжээний Маск',
    wildcard:'Wildcard Маск',
    network:'Сүлжээний Хаяг',
    broadcast:'Broadcast Хаяг',
    range:'Ашиглах Хүрээ',
    hosts:'Ашиглах Хост',
    advancedView:'Бинари Харагдац',
    showAdvanced:'Бинари мэдээлэл харах',
    hideAdvanced:'Бинари мэдээлэл нуух',
    addressCount:'Нийт Хаяг',
    category:'Хаягийн Төрөл',
    address:'Хаяг',
    hostMin:'Хамгийн Бага Хост',
    hostMax:'Хамгийн Их Хост',
    typePrivate:'RFC 1918 Хувийн муж',
    typeShared:'RFC 6598 CGNAT/Shared муж',
    typeLinkLocal:'RFC 3927 Link-local муж',
    typeReserved:'Тусгай хэрэглээ эсвэл нөөцлөгдсөн муж',
    typePublic:'Нийтэд чиглүүлж болох муж'
  }
};

function t(key){return translations[currentLanguage][key]||key}

function toggleTheme(){document.body.classList.toggle('dark');document.body.classList.toggle('light')}

function changeLanguage(lang){
  currentLanguage=translations[lang]?lang:'mn';
  document.documentElement.lang=currentLanguage;
  document.getElementById('langFlag').src=currentLanguage==='mn'?'./flag-mn.svg':'./flag-us.svg';
  document.getElementById('langFlag').alt=currentLanguage==='mn'?'Mongolia flag':'USA flag';
  document.getElementById('langToggle').title=t('langLabel');
  document.getElementById('copyIconBtn').title=t('copyTitle');
  document.getElementById('copyIconBtn').setAttribute('aria-label',t('copyTitle'));
  document.getElementById('ipActionBtn').textContent=t('infoButton');
  showStatus('');
  calculate();
}

function toggleLanguage(){
  changeLanguage(currentLanguage==='mn'?'en':'mn');
}

function toggleAdvanced(){
  advancedOpen=!advancedOpen;
  calculate();
}

function prepareFieldSelect(event,el){
  if(event.button!==0) return;
  event.preventDefault();
  el.focus();
  selectField(el);
}

function selectField(el){
  requestAnimationFrame(()=>el.select());
}

function showStatus(message){
  document.getElementById('status').textContent=message||'';
}

function nav(e,el){
  if(e.key==='ArrowRight'){
    let nextEl=el.nextElementSibling;
    while(nextEl&&nextEl.tagName!=='INPUT') nextEl=nextEl.nextElementSibling;
    if(nextEl) nextEl.focus();
  }
  if(e.key==='ArrowLeft'){
    let prevEl=el.previousElementSibling;
    while(prevEl&&prevEl.tagName!=='INPUT') prevEl=prevEl.previousElementSibling;
    if(prevEl) prevEl.focus();
  }
}

function next(el){
  const val=el.value.replace(/[^0-9]/g,'');
  el.value=val;
  el.classList.toggle('invalid',val!==''&&Number(val)>255);
  if(val.length===3&&el.nextElementSibling) el.nextElementSibling.focus();
  calculate();
}

function handleCidrInput(el){
  const val=el.value.replace(/[^0-9]/g,'').slice(0,2);
  el.value=val;
  el.classList.toggle('invalid',val!==''&&(Number(val)<0||Number(val)>32));
  calculate();
}

function handlePaste(event){
  const pasted=(event.clipboardData||window.clipboardData)?.getData('text')?.trim();
  if(!pasted) return;

  const match=pasted.match(/^(\d{1,3}(?:\.\d{1,3}){3})(?:\/(\d{1,2}))?$/);
  if(!match) return;

  event.preventDefault();
  setIP(match[1]);
  if(match[2]) document.getElementById('cidr').value=match[2];
  calculate();
}

function getIP(){return ipInputs().map(i=>i.value).join('.')}

function setIP(ip){
  const parts=(ip||'').split('.');
  ipInputs().forEach((input,index)=>{
    input.value=parts[index]||'';
    input.classList.toggle('invalid',input.value!==''&&Number(input.value)>255);
  });
}

function showTempStatus(message){
  const toast=document.getElementById('toast');
  toast.textContent=message;
  toast.classList.add('show');
  clearTimeout(showTempStatus.timer);
  showTempStatus.timer=setTimeout(()=>toast.classList.remove('show'),3000);
}

async function copyIpValue(){
  const value=getIP();
  try{
    if(navigator.clipboard&&window.isSecureContext){
      await navigator.clipboard.writeText(value);
    }else{
      const textarea=document.createElement('textarea');
      textarea.value=value;
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand('copy');
      document.body.removeChild(textarea);
    }
    showTempStatus(t('copied'));
  }catch(e){
    showTempStatus(t('copyFailed'));
  }
}

function ipToInt(ip){return ip.split('.').reduce((a,o)=>(a<<8)+(+o||0),0)>>>0}
function intToIp(int){return [24,16,8,0].map(s=>(int>>>s)&255).join('.')}

function renderBinary(ip,cidr){
  const bits=ip.split('.').map(o=>(+o).toString(2).padStart(8,'0')).join('.');
  const compact=bits.replace(/\./g,'');
  return `${compact.slice(0,cidr)} ${compact.slice(cidr)}`.trim().replace(/(.{8})(?=.)/g,'$1.');
}

function isPrivate(ip){
  const p=ip.split('.').map(Number);
  return p[0]===10||(p[0]===172&&p[1]>=16&&p[1]<=31)||(p[0]===192&&p[1]===168);
}

function isShared(ip){
  const p=ip.split('.').map(Number);
  return p[0]===100&&p[1]>=64&&p[1]<=127;
}

function isLinkLocal(ip){
  const p=ip.split('.').map(Number);
  return p[0]===169&&p[1]===254;
}

function isReserved(ip){
  const p=ip.split('.').map(Number);
  return p[0]===0||p[0]===127||p[0]>=224;
}

function getAddressType(ip){
  if(isPrivate(ip)) return 'private';
  if(isShared(ip)) return 'shared';
  if(isLinkLocal(ip)) return 'linklocal';
  if(isReserved(ip)) return 'reserved';
  return 'public';
}

function getClass(ip){
  const f=+ip.split('.')[0];
  if(f===0)return'Class A (Reserved)';
  if(f>=1&&f<=126)return'Class A';
  if(f===127)return'Class A (Loopback)';
  if(f>=128&&f<=191)return'Class B';
  if(f>=192&&f<=223)return'Class C';
  if(f>=224&&f<=239)return'Class D (Multicast)';
  if(f>=240&&f<=255)return'Class E (Reserved)';
  return'Unknown';
}

function parseNetwork(network){
  const [base,cidrText]=network.split('/');
  const cidr=Number(cidrText);
  const start=ipToInt(base);
  const mask=cidr===0?0:(~0<<(32-cidr))>>>0;
  const end=(start | (~mask>>>0))>>>0;
  return {start,end};
}

function summaryRow(label,value){
  return `<div><b>${label}:</b> ${value}</div>`;
}

function updateIpAction(addressType,ip){
  const button=document.getElementById('ipActionBtn');
  const disabled=addressType!=='public';
  button.disabled=disabled;
  button.title=disabled?t('infoDisabled'):t('infoTitle');
  button.setAttribute('aria-label',button.title);
  button.dataset.ip=ip;
  button.textContent=t('infoButton');
}

function handleIpAction(){
  const button=document.getElementById('ipActionBtn');
  if(button.disabled) return;
  const ip=button.dataset.ip;
  if(ip) window.open(`https://ipinfo.io/${ip}`,'_blank','noopener');
}

function binaryRow(label,ip,cidr){
  return `<div class="binary-row"><div class="binary-label">${label}</div><div class="binary-value">${renderBinary(ip,cidr)}</div></div>`;
}

async function calculate(){
  const ip=getIP();
  const cidr=parseInt(document.getElementById('cidr').value,10);
  const out=document.getElementById('output');

  if(ip.includes('..')||isNaN(cidr)||cidr<0||cidr>32){
    document.getElementById('cidr').classList.add('invalid');
    out.innerHTML='';
    showStatus(t('invalid'));
    return;
  }
  document.getElementById('cidr').classList.remove('invalid');

  const octets=ip.split('.').map(Number);
  if(octets.some(o=>o<0||o>255||Number.isNaN(o))){
    out.innerHTML='';
    showStatus(t('invalid'));
    return;
  }

  showStatus('');

  const ipInt=ipToInt(ip);
  const mask=cidr===0?0:(~0<<(32-cidr))>>>0;
  const wildcard=(~mask)>>>0;
  const net=ipInt & mask;
  const bc=net | wildcard;
  const totalAddresses=2**(32-cidr);
  const usableHosts=cidr===32?1:cidr===31?2:Math.max(0,totalAddresses-2);
  const first=cidr>=31?net:net+1;
  const last=cidr>=31?bc:bc-1;
  const addressType=getAddressType(ip);
  const cls=getClass(ip);

  const addressLabels={
    private:[t('badgePrivate'),t('typePrivate')],
    shared:[t('badgeShared'),t('typeShared')],
    linklocal:[t('badgeLinkLocal'),t('typeLinkLocal')],
    reserved:[t('badgeReserved'),t('typeReserved')],
    public:[t('badgePublic'),t('typePublic')]
  };
  const [badgeLabel,categoryText]=addressLabels[addressType]||addressLabels.public;
  updateIpAction(addressType,ip);

  const summaryRows=[
    [t('category'),categoryText],
    [t('addressClass'),cls],
    [t('subnetMask'),intToIp(mask)],
    [t('wildcard'),intToIp(wildcard)],
    [t('network'),`${intToIp(net)}/${cidr}`],
    [t('broadcast'),intToIp(bc)],
    [t('range'),`${intToIp(first)} - ${intToIp(last)}`],
    [t('hosts'),usableHosts],
    [t('addressCount'),totalAddresses]
  ];
  const binaryRows=[
    [t('address'),ip],
    [t('subnetMask'),intToIp(mask)],
    [t('wildcard'),intToIp(wildcard)],
    [t('network'),intToIp(net)],
    [t('hostMin'),intToIp(first)],
    [t('hostMax'),intToIp(last)],
    [t('broadcast'),intToIp(bc)]
  ];

  const advancedButton=`<div class="advanced-toggle ${advancedOpen?'':'collapsed'}" onclick="toggleAdvanced()">${advancedOpen?t('hideAdvanced'):t('showAdvanced')}</div>`;
  const advancedPanel=advancedOpen?`
  <div class="advanced-panel">
    <div style="font-weight:700;margin-bottom:8px">${t('advancedView')}</div>
    ${binaryRows.map(([label,value])=>binaryRow(label,value,cidr)).join('')}
  </div>
  `:'';

  out.innerHTML=`
  <div class="badges">
    <span class="badge ${addressType}">${badgeLabel}</span>
  </div>

  <div class="summary-grid">
    ${summaryRows.map(([label,value])=>summaryRow(label,value)).join('')}
  </div>

  ${advancedButton}
  ${advancedPanel}
  `;
}

console.assert(ipToInt('192.168.1.1')===3232235777,'ipToInt failed');
console.assert(intToIp(3232235777)==='192.168.1.1','intToIp failed');
console.assert(isPrivate('192.168.1.1')===true,'private detection failed');
console.assert(isShared('100.64.0.1')===true,'shared range detection failed');
console.assert(isLinkLocal('169.254.1.1')===true,'link-local detection failed');
console.assert(getClass('8.8.8.8')==='Class A','class detection failed');
console.assert(getClass('172.16.0.1')==='Class B','Class B detection failed');
console.assert(getClass('192.168.1.1')==='Class C','Class C detection failed');
console.assert(getClass('224.0.0.1')==='Class D (Multicast)','Class D detection failed');
console.assert(getClass('240.0.0.1')==='Class E (Reserved)','Class E detection failed');

function init(){
  ipInputs().forEach(input=>input.addEventListener('paste',handlePaste));
  setIP('192.168.1.100');
  document.getElementById('cidr').value=32;
  changeLanguage('mn');
}

init();
</script>

</body>
</html>
